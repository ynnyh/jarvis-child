<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>认一认 · 认读「水」 · 软3D糖果风 mockup</title>
<!--
  ============================================================
  02 · 认读（recognize & read）单字学习步骤
  ------------------------------------------------------------
  这是「学习流」核心一步：为单个目标字（例：水 shuǐ）做认读。
  主题色 = 自然绿 --c-nature，作为强调色驱动整屏氛围。
  结构：子标题栏 → 步骤点 → 大字舞台（主角）+ 喇叭 → 拼音 →
        组成提示 → 词语行 → 底部「下一步」+ 小墨鼓励气泡。
  静态设计稿，浏览器直接打开预览。复用 _candy.css 的质感配方。
  ============================================================
-->
<link rel="stylesheet" href="_candy.css">
<style>
  body {
    background: #e8eef5;
    padding: 40px;
    display: flex;
    justify-content: center;
  }

  /* 屏幕根：注入主题色，供强调元素引用 */
  .screen {
    --theme-color: var(--c-nature);
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    padding: 56px 20px 24px;
    background:
      radial-gradient(140% 90% at 50% -10%,
        color-mix(in srgb, var(--theme-color) 22%, #fffaf2) 0%,
        var(--c-paper) 55%,
        var(--c-paper) 100%);
  }

  /* ---- 子标题栏 ---- */
  .subhead {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--s-3);
  }
  .subhead__title {
    font-weight: 900;
    font-size: var(--f-lg);
    color: var(--c-ink);
    letter-spacing: 1px;
  }

  /* 圆形返回钮：白果冻圆 */
  .circ-btn {
    width: var(--tap-min);
    height: var(--tap-min);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--c-ink-soft);
    background: linear-gradient(180deg, #fff 0%, #fff 55%, #f4ece0 100%);
    box-shadow:
      inset 0 3px 0 rgba(255,255,255,0.9),
      0 6px 0 #e8dcc9,
      0 12px 20px rgba(120, 90, 40, 0.16);
    transition: transform 0.12s var(--ease-juicy), box-shadow 0.12s var(--ease-juicy);
  }
  .circ-btn:active {
    transform: translateY(5px);
    box-shadow: inset 0 3px 0 rgba(255,255,255,0.9), 0 2px 0 #e8dcc9;
  }
  .circ-btn svg { width: 40%; height: 40%; }

  /* 进度药丸：主题色调 */
  .prog-pill {
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.18);
    background: linear-gradient(180deg,
      color-mix(in srgb, var(--theme-color) 72%, #fff) 0%,
      var(--theme-color) 55%,
      color-mix(in srgb, var(--theme-color) 80%, #000) 100%);
    box-shadow:
      var(--gloss-hi),
      0 5px 0 color-mix(in srgb, var(--theme-color) 70%, #000),
      0 10px 18px rgba(60,80,120,0.2);
  }

  /* ---- 步骤点 ---- */
  .steps {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: var(--s-5);
  }
  .step-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--c-line);
    box-shadow: inset 0 -2px 3px rgba(0,0,0,0.12), inset 0 2px 0 rgba(255,255,255,0.7);
    transition: all 0.3s var(--ease-juicy);
  }
  .step-dot.done {
    background: linear-gradient(180deg,
      color-mix(in srgb, var(--c-success) 65%, #fff),
      var(--c-success));
    box-shadow: inset 0 2px 0 rgba(255,255,255,0.7), 0 2px 4px rgba(76,175,125,0.4);
  }
  .step-dot.current {
    width: 22px;
    height: 22px;
    background: radial-gradient(120% 120% at 50% 0%,
      #fff 0%,
      color-mix(in srgb, var(--theme-color) 60%, #fff) 40%,
      var(--theme-color) 100%);
    box-shadow:
      inset 0 2px 0 rgba(255,255,255,0.9),
      0 4px 0 color-mix(in srgb, var(--theme-color) 70%, #000),
      0 8px 14px rgba(60,80,120,0.24);
  }

  /* ---- 主体居中列 ---- */
  .body-stack {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--s-4);
    padding-top: var(--s-5);
    min-height: 0;
  }

  /* 大字舞台包裹：字 + 悬浮喇叭 */
  .hero {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .hero .char-stage {
    width: 200px;
    height: 200px;
    font-size: 132px;
    line-height: 1;
  }
  /* 喇叭：悬浮在舞台右下角 */
  .hero .spk {
    position: absolute;
    right: -14px;
    bottom: -14px;
  }

  /* 拼音 */
  .pinyin {
    font-family: var(--font-ui);
    font-weight: 900;
    font-size: 40px;
    letter-spacing: 2px;
    color: var(--theme-color);
    text-shadow: 0 2px 0 rgba(255,255,255,0.9), 0 4px 8px rgba(92,201,167,0.25);
  }

  /* 组成提示 chip */
  .compose {
    display: inline-flex;
    align-items: center;
    gap: var(--s-2);
    padding: 10px var(--s-4);
    border-radius: var(--r-pill);
    font-weight: 800;
    font-size: var(--f-sm);
    color: var(--c-ink-soft);
    background: rgba(255,255,255,0.92);
    box-shadow: var(--pop-sm);
  }
  .compose__label { color: var(--c-ink-soft); }
  .compose__part {
    font-family: var(--font-kai);
    font-weight: 900;
    font-size: var(--f-md);
    padding: 2px 12px;
    border-radius: 12px;
    background: var(--comp-bg);
    color: var(--comp-ink);
    box-shadow: inset 0 -3px 6px rgba(61,127,214,0.14), inset 0 2px 0 rgba(255,255,255,0.8);
  }
  .compose__x { color: var(--c-ink-soft); font-weight: 900; font-size: 14px; }

  /* ---- 词语行 ---- */
  .words {
    display: flex;
    gap: var(--s-3);
    width: 100%;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: var(--s-2);
  }
  .word-chip {
    display: inline-flex;
    align-items: center;
    gap: var(--s-2);
    min-height: 68px;
    padding: 0 18px 0 20px;
    border: none;
    cursor: pointer;
    border-radius: var(--r-xl);
    font-family: var(--font-kai);
    font-weight: 900;
    font-size: 26px;
    color: var(--c-ink);
    background: linear-gradient(180deg, #fffdf8 0%, var(--c-card-warm) 100%);
    box-shadow:
      inset 0 3px 0 rgba(255,255,255,0.9),
      0 7px 0 var(--c-card-warm-edge),
      0 14px 22px rgba(120,90,40,0.14);
    transition: transform 0.12s var(--ease-juicy), box-shadow 0.12s var(--ease-juicy);
  }
  .word-chip:active {
    transform: translateY(5px);
    box-shadow: inset 0 3px 0 rgba(255,255,255,0.9), 0 2px 0 var(--c-card-warm-edge);
  }
  /* 词语里的目标字用主题色轻点 */
  .word-chip .hl { color: var(--theme-color); }
  /* 小喇叭提示图标 */
  .word-chip__spk {
    width: 30px;
    height: 30px;
    flex-shrink: 0;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    background: linear-gradient(180deg,
      color-mix(in srgb, #67c7f5 72%, #fff) 0%, #67c7f5 55%,
      color-mix(in srgb, #67c7f5 80%, #000) 100%);
    box-shadow: inset 0 2px 0 rgba(255,255,255,0.7), 0 3px 6px rgba(60,120,180,0.3);
  }
  .word-chip__spk svg { width: 54%; height: 54%; }

  /* ---- 底部区 ---- */
  .footer {
    margin-top: auto;
    padding-top: var(--s-4);
  }
  /* 小墨 + 气泡 */
  .mascot-row {
    display: flex;
    align-items: flex-end;
    gap: var(--s-3);
    margin-bottom: var(--s-4);
    padding: 0 var(--s-2);
  }
  .mascot { width: 74px; height: 74px; flex-shrink: 0; }
  .bubble {
    position: relative;
    flex: 1;
    padding: 14px 18px;
    border-radius: 22px 22px 22px 6px;
    font-weight: 800;
    font-size: var(--f-md);
    color: var(--c-ink);
    background: linear-gradient(180deg, #fff 0%, #fffaf2 100%);
    box-shadow:
      inset 0 3px 0 rgba(255,255,255,0.9),
      0 6px 0 var(--c-card-warm-edge),
      0 12px 22px rgba(120,90,40,0.14);
  }
  /* 气泡尾巴指向小墨 */
  .bubble::before {
    content: "";
    position: absolute;
    left: -9px;
    bottom: 12px;
    width: 18px;
    height: 18px;
    background: #fffaf2;
    border-radius: 3px;
    transform: rotate(45deg);
    box-shadow: -2px 2px 4px rgba(120,90,40,0.08);
  }

  .next-btn {
    width: 100%;
    --btn: var(--c-nature);
    font-size: var(--f-lg);
  }
  .next-btn svg { width: 22px; height: 22px; }
</style>
</head>
<body>

<div class="phone">
  <div class="phone__screen">
    <div class="screen">

      <!-- 子标题栏：返回 · 标题 · 进度 -->
      <div class="subhead">
        <button class="circ-btn" aria-label="返回">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 5 L8 12 L15 19"/>
          </svg>
        </button>
        <div class="subhead__title">认一认</div>
        <div class="pill prog-pill">3/7</div>
      </div>

      <!-- 步骤点：7 步，当前第 3 步 -->
      <div class="steps">
        <span class="step-dot done"></span>
        <span class="step-dot done"></span>
        <span class="step-dot current"></span>
        <span class="step-dot"></span>
        <span class="step-dot"></span>
        <span class="step-dot"></span>
        <span class="step-dot"></span>
      </div>

      <!-- 主体：大字主角 -->
      <div class="body-stack">

        <div class="hero popin">
          <div class="char-stage kai">水</div>
          <!-- 喇叭：唯一的播放入口，白喇叭 + 声波，招手抖动 -->
          <button class="spk spk--lg spk--wiggle" aria-label="朗读 水">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 9 H7 L12 5 V19 L7 15 H4 Z" fill="#fff" stroke="none"/>
              <path class="spk-wave" d="M15.5 8.5 A5 5 0 0 1 15.5 15.5"/>
              <path class="spk-wave w2" d="M18 6 A9 9 0 0 1 18 18"/>
            </svg>
          </button>
        </div>

        <!-- 拼音 -->
        <div class="pinyin">shuǐ</div>

        <!-- 组成提示：水由 4 笔构成（简单呈现） -->
        <div class="compose">
          <span class="compose__label">组成</span>
          <span class="compose__part kai">丨</span>
          <span class="compose__x">+</span>
          <span class="compose__part kai">水</span>
          <span class="compose__label">· 4 笔</span>
        </div>

        <!-- 词语行：含「水」的词 -->
        <div class="words">
          <button class="word-chip">
            <span><span class="hl kai">水</span>果</span>
            <span class="word-chip__spk" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="#fff"><path d="M4 9 H7 L12 5 V19 L7 15 H4 Z"/></svg>
            </span>
          </button>
          <button class="word-chip">
            <span>喝<span class="hl kai">水</span></span>
            <span class="word-chip__spk" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="#fff"><path d="M4 9 H7 L12 5 V19 L7 15 H4 Z"/></svg>
            </span>
          </button>
          <button class="word-chip">
            <span><span class="hl kai">水</span>花</span>
            <span class="word-chip__spk" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="#fff"><path d="M4 9 H7 L12 5 V19 L7 15 H4 Z"/></svg>
            </span>
          </button>
        </div>

      </div>

      <!-- 底部：小墨鼓励 + 下一步 -->
      <div class="footer">
        <div class="mascot-row">
          <!-- 小墨：软墨滴/麻薯生物 -->
          <svg class="mascot breathe" viewBox="0 0 100 100" aria-label="小墨">
            <defs>
              <radialGradient id="mo-body" cx="42%" cy="30%" r="80%">
                <stop offset="0%" stop-color="#8fb9ff"/>
                <stop offset="55%" stop-color="#6fa8ff"/>
                <stop offset="100%" stop-color="#4d86e0"/>
              </radialGradient>
            </defs>
            <!-- 底座软影 -->
            <ellipse cx="50" cy="92" rx="26" ry="6" fill="rgba(60,80,120,0.18)"/>
            <!-- 圆润墨滴身体 -->
            <path d="M50 12
                     C74 12 86 32 86 54
                     C86 78 70 90 50 90
                     C30 90 14 78 14 54
                     C14 32 26 12 50 12 Z" fill="url(#mo-body)"/>
            <!-- 顶部高光 -->
            <ellipse cx="40" cy="30" rx="16" ry="11" fill="rgba(255,255,255,0.45)"/>
            <!-- 眼睛 -->
            <circle cx="39" cy="50" r="8" fill="#2f3850"/>
            <circle cx="61" cy="50" r="8" fill="#2f3850"/>
            <circle cx="42" cy="47" r="2.6" fill="#fff"/>
            <circle cx="64" cy="47" r="2.6" fill="#fff"/>
            <!-- 腮红 -->
            <ellipse cx="28" cy="62" rx="6" ry="4" fill="#ff9db3" opacity="0.75"/>
            <ellipse cx="72" cy="62" rx="6" ry="4" fill="#ff9db3" opacity="0.75"/>
            <!-- 微笑 -->
            <path d="M43 63 Q50 70 57 63" fill="none" stroke="#2f3850"
                  stroke-width="3" stroke-linecap="round"/>
          </svg>
          <div class="bubble">跟我一起读！</div>
        </div>

        <button class="candy-btn next-btn">
          下一步
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 5 L16 12 L9 19"/>
          </svg>
        </button>
      </div>

    </div>
  </div>
</div>

</body>
</html>
