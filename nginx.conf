server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 安全响应头（server 级默认）。注意 nginx 陷阱：任何 location 里出现 add_header
    # 都会「替换」继承自 server 级的全部 add_header，因此下面设了 Cache-Control 的
    # location 必须把这几行一并重声明（见各 location 内的 include 注释）。
    # always 保证错误响应（4xx/5xx）也带上这些头。
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # API 反代到后端容器（同一 docker 网络，容器名 jarvis-child-backend）。
    # 后端所有路由都在 /api 前缀下，直接透传。
    location /api/ {
        proxy_pass http://jarvis-child-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 同步偶尔较大，放宽超时。
        proxy_read_timeout 60s;
    }

    # 用 HashRouter，路由都在 # 后面，静态文件按原样服务即可；
    # 兜底 fallback 到 index.html，避免直接访问未知路径时 404。
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 笔画数据 JSON 长期缓存（内容不变，文件名即字符）。
    # 注意：本 location 有 add_header，会覆盖 server 级安全头，故需重声明。
    location /char-data/ {
        add_header Cache-Control "public, max-age=2592000";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
    }

    # 预生成音频长期缓存（文件名是内容 hash，不变）。
    # 同上：重声明安全头。
    location /audio/ {
        add_header Cache-Control "public, max-age=2592000";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
    }

    # 带 hash 的构建资源可永久缓存。
    # 同上：重声明安全头。
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
    }

    # 简单 gzip，减小传输体积。
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
